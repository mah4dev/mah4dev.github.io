        /* ---- helpers --------------------------------------------- */
        function esc(s) { return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
        function linkify(s) {
            return s.replace(/(https?:\/\/[^\s<)]+)/g, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
        }
        function pathStr() { return "~" + (cwd.length ? "/" + cwd.join("/") : ""); }
        function renderPrompt() {
            promptStr.innerHTML = `<span class="u">${USER}@${HOST}</span>:<span class="path">${pathStr()}</span>$&nbsp;`;
        }
        function scroll() { screen.scrollTop = screen.scrollHeight; }

        function print(html = "", cls = "") {
            const div = document.createElement("div");
            div.className = "out line" + (cls ? " " + cls : "");
            div.innerHTML = html;
            screen.appendChild(div);
            scroll();
            return div;
        }
        function printText(text, cls = "") { print(linkify(esc(text)), cls); }

        /* resolve a dir node from current cwd */
        function dirNode(segs) {
            let node = FS;
            for (const s of segs) {
                if (node[s] && node[s].type === "dir") { node = node[s].children; }
                else return null;
            }
            return node;
        }
        function resolve(argPath) {
            // returns {segs, node, isDir, name} or null
            let segs = argPath.startsWith("/") ? [] : [...cwd];
            if (argPath === "~" || argPath === "/") segs = [];
            const parts = argPath.replace(/^~\/?/, "").split("/").filter(Boolean);
            for (const p of parts) {
                if (p === ".") continue;
                if (p === "..") { segs.pop(); continue; }
                const here = dirNode(segs);
                if (!here || !here[p]) return { error: `no such file or directory: ${argPath}` };
                if (here[p].type === "dir") { segs.push(p); }
                else { return { segs, file: here[p], name: p, isDir: false }; }
            }
            return { segs, node: dirNode(segs), isDir: true };
        }

        /* ---- commands -------------------------------------------- */
        const COMMANDS = {
            help() {
                print(
                    `<span class="dim">available commands</span>
  <span class="red">whoami</span>    who is trishul  <span class="faint">(the good stuff)</span>
  <span class="red">ls</span>        list the current directory
  <span class="red">cd</span> &lt;dir&gt;  change directory  <span class="faint">(cd .. to go up)</span>
  <span class="red">cat</span> &lt;file&gt; read a file
  <span class="red">tree</span>      show the whole filesystem
  <span class="red">pwd</span>       print working directory
  <span class="red">clear</span>     clear the screen
  <span class="red">banner</span>    reprint the intro
  <span class="red">contact</span>   how to reach me
  <span class="red">date</span>      current date/time

<span class="faint">tip: use Tab to autocomplete, ↑/↓ for history, or tap a chip below.</span>`);
            },

            ls(arg) {
                const target = arg ? resolve(arg) : { segs: cwd, node: dirNode(cwd), isDir: true };
                if (target.error) { printText("ls: " + target.error); return; }
                if (!target.isDir) { printText(target.name); return; }
                const node = target.node;
                const keys = Object.keys(node);
                if (!keys.length) { print('<span class="dim">(empty)</span>'); return; }
                print(`<div class="lsrow">${keys.map(k =>
                    node[k].type === "dir" ? `<span class="d">${esc(k)}/</span>` : `<span class="f">${esc(k)}</span>`
                ).join("")}</div>`);
            },

            cd(arg) {
                if (!arg || arg === "~") { cwd = []; renderPrompt(); return; }
                const r = resolve(arg);
                if (r.error) { printText("cd: " + r.error); return; }
                if (!r.isDir) { printText("cd: not a directory: " + arg); return; }
                cwd = r.segs; renderPrompt();
            },

            cat(arg) {
                if (!arg) { printText("cat: missing file operand"); return; }
                const r = resolve(arg);
                if (r.error) { printText("cat: " + r.error); return; }
                if (r.isDir) { printText("cat: " + arg + ": is a directory"); return; }
                printText(r.file.content);
            },

            pwd() { printText(pathStr()); },

            tree() {
                const lines = ["<span class='red'>~</span>"];
                (function walk(node, prefix) {
                    const keys = Object.keys(node);
                    keys.forEach((k, i) => {
                        const last = i === keys.length - 1;
                        const branch = last ? "└── " : "├── ";
                        const isDir = node[k].type === "dir";
                        lines.push(`<span class="faint">${prefix}${branch}</span>` +
                            (isDir ? `<span class="d">${esc(k)}/</span>` : `<span class="f">${esc(k)}</span>`));
                        if (isDir) walk(node[k].children, prefix + (last ? "    " : "│   "));
                    });
                })(FS, "");
                print(lines.join("\n"));
            },

            clear() { screen.innerHTML = ""; },

            whoami() { neofetch(); },
            about() { COMMANDS.cat("about.txt"); },
            contact() { COMMANDS.cat("contact.txt"); },

            banner() {

            date() { printText(new Date().toString()); },

            echo(arg) { printText(arg || ""); },

            history() {

                print(history.map((h, i) => `  <span class="faint">${String(i + 1).padStart(3)}</span>  ${esc(h)}`).join("\n"));

        /* ---- run a command --------------------------------------- */
        function echoCommand(raw) {
            print(`<span class="cmd-echo"><span class="p">${USER}@${HOST}:${pathStr()}$</span> ${esc(raw)}</span>`);
        }
        function run(raw) {
            const trimmed = raw.trim();
            if (trimmed) { history.push(trimmed); }
            histIdx = history.length;
            echoCommand(raw);
            if (!trimmed) return;
            const [cmd, ...rest] = trimmed.split(/\s+/);
            const arg = rest.join(" ");
            const name = ALIAS[cmd] || cmd;
            if (COMMANDS[name]) { COMMANDS[name](arg); }
            else {
                print(`<span class="red">command not found: ${esc(cmd)}</span> <span class="faint">— type </span><span class="red">help</span>`);
            }
        }

        /* ---- input wiring ---------------------------------------- */
        function syncMirror() { mirror.textContent = input.value; }
        input.addEventListener("input", syncMirror);

        input.addEventListener("keydown", (e) => {
            if (booting) { e.preventDefault(); return; }
            if (e.key === "Enter") {
                const v = input.value;
                input.value = ""; syncMirror();
                run(v);
            } else if (e.key === "ArrowUp") {
                e.preventDefault();
                if (histIdx > 0) { histIdx--; input.value = history[histIdx] || ""; syncMirror(); moveCaretEnd(); }
            } else if (e.key === "ArrowDown") {
                e.preventDefault();
                if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx] || ""; }
                else { histIdx = history.length; input.value = ""; }
                syncMirror(); moveCaretEnd();
            } else if (e.key === "Tab") {
                e.preventDefault();
                complete();
            } else if (e.key === "l" && e.ctrlKey) {
                e.preventDefault();
                COMMANDS.clear();
            }
        });
        function moveCaretEnd() { requestAnimationFrame(() => { const n = input.value.length; input.setSelectionRange(n, n); }); }

        function complete() {
            const val = input.value;
            const parts = val.split(/\s+/);
            if (parts.length <= 1) {
                const cands = Object.keys(COMMANDS).filter(c => c.startsWith(val));
                if (cands.length === 1) { input.value = cands[0] + " "; }
                else if (cands.length > 1) { print('<span class="dim">' + cands.join("  ") + "</span>"); }
            } else {
                const frag = parts[parts.length - 1];
                const node = dirNode(cwd) || {};
                const cands = Object.keys(node).filter(k => k.startsWith(frag));
                if (cands.length === 1) {
                    parts[parts.length - 1] = cands[0] + (node[cands[0]].type === "dir" ? "/" : "");
                    input.value = parts.join(" ");
                } else if (cands.length > 1) { print('<span class="dim">' + cands.join("  ") + "</span>"); }
            }
            syncMirror(); moveCaretEnd();
        }

        /* focus handling */
        function focusInput() { if (!booting) input.focus(); }
        inputLine.addEventListener("mousedown", (e) => { if (e.target !== input) { e.preventDefault(); focusInput(); } });
        screen.addEventListener("mouseup", () => { if (!window.getSelection().toString()) focusInput(); });
        input.addEventListener("focus", () => curs.classList.remove("hidden"));
        input.addEventListener("blur", () => curs.classList.add("hidden"));

        /* chips */
        const CHIPS = [
            ["whoami", "whoami"], ["projects", "cd ~ && cd projects && ls"], ["writeups", "cd ~ && cd writeups && ls"],
            ["now", "cd ~ && cat now.txt"], ["contact", "cd ~ && cat contact.txt"], ["tree", "tree"], ["help", "help"]
        ];
        CHIPS.forEach(([label, command]) => {
            const b = document.createElement("button");
            b.className = "chip"; b.textContent = label; b.type = "button";
            b.addEventListener("click", () => {
                if (booting) return;
                // support "a && b"
                command.split("&&").map(s => s.trim()).forEach(run);
                focusInput();
            });
            chipsEl.appendChild(b);
        });

        /* CRT toggle */
        function setCRT(on) {
            win.classList.toggle("crt", on);
            win.classList.toggle("flicker", on);
            crtBtn.setAttribute("aria-pressed", on ? "true" : "false");
        }
        crtBtn.addEventListener("click", () => setCRT(!win.classList.contains("crt")));
        setCRT(true);

        /* ---- boot sequence --------------------------------------- */
        const BOOT = [
            ['<span class="faint">[    0.000000]</span> trishul boot loader v1.3'],
            ['<span class="faint">[    0.041414]</span> initializing kernel modules ...'],
            ['<span class="faint">[    0.133737]</span> mounting /dev/soul ................ <span class="ok">ok</span>'],
            ['<span class="faint">[    0.204411]</span> loading operator profile: <span class="red">trishul</span>'],
            ['<span class="ok">[+]</span> offensive security     <span class="dim">loaded</span>'],
            ['<span class="ok">[+]</span> adversary emulation    <span class="dim">loaded</span>'],
            ['<span class="ok">[+]</span> reversing              <span class="dim">loaded</span>'],
            ['<span class="faint">[    0.512900]</span> 3 modules ready — standing by'],
        ];
        const MOTD = [
            "",
            '<pre class="art">' + esc(ART) + '</pre>',
            '<span class="dim">  har har mahadev — the trident guards the three worlds.</span>',
            "",
            '<span class="dim">  type </span><span class="red">help</span><span class="dim"> to list commands · or tap a chip below · </span><span class="red">whoami</span><span class="dim"> is a good start.</span>',
            ""
        ];

        function finishBoot() {
            booting = false;
            renderPrompt();
            curs.classList.remove("hidden");
            input.focus();
        }

        function boot() {
            renderPrompt();
            const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            const seq = [...BOOT.map(l => l[0]), ...MOTD];
            if (reduce) {
                seq.forEach(h => print(h));
                finishBoot();
                return;
            }
            let i = 0;
            let timer;
            function step() {
                if (i >= seq.length) { finishBoot(); return; }
                print(seq[i]);
                const delay = seq[i].includes("art") ? 220 : (seq[i].includes("[+]") ? 130 : 90);
                i++;
                timer = setTimeout(step, delay);
            }
            // allow skip
            function skip() {
                clearTimeout(timer);
                while (i < seq.length) { print(seq[i]); i++; }
                window.removeEventListener("keydown", skip, true);
                win.removeEventListener("click", skip, true);
                finishBoot();
            }
            window.addEventListener("keydown", skip, true);
            win.addEventListener("click", skip, true);
            step();
        }

        boot();
